<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GIS Карта - Самара</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: Arial, sans-serif;
      }
      
      main {
        width: 100vw;
        height: 100vh;
      }
      
      #map {
        width: 100%;
        height: 100%;
      }
      
      .controls {
        position: absolute;
        top: 10px;
        right: 10px;
        background: white;
        padding: 10px;
        border-radius: 5px;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        z-index: 1000;
        font-size: 14px;
      }
      
      .controls h3 {
        margin-bottom: 10px;
      }
      
      .controls label {
        display: block;
        margin: 5px 0;
        cursor: pointer;
      }
      
      .controls input {
        margin-right: 5px;
      }
    </style>
  </head>
  <body>
    <main>
      <div id="map"></div>
      <div class="controls">
        <h3>Слои карты</h3>
        <label>
          <input type="checkbox" id="buildingsToggle" checked> Здания
        </label>
        <label>
          <input type="checkbox" id="roadsToggle" checked> Дороги
        </label>
        <label>
          <input type="checkbox" id="poiToggle" checked> POI (Точки интереса)
        </label>
      </div>
    </main>
    <script type="module" src="/main.js"></script>
  </body>
</html>
